<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin | Porco do Bicho</title>
  <link rel="icon" type="image/png" href="../img/mascote/icone.png?v=20260425">
  <link rel="apple-touch-icon" href="../img/mascote/icone.png?v=20260425">
  <link rel="stylesheet" href="../css/style.css?v=20260427-7">
  <link rel="stylesheet" href="../css/paginas.css?v=20260425">
  <link rel="stylesheet" href="../css/admin.css?v=20260425-9">
</head>
<body>
  <header class="topo-pagina">
    <div class="topo-pagina-conteudo topo-admin">
      <a href="../index.html">← Voltar para Home</a>
      <strong>Painel Admin</strong>
    </div>
  </header>

  <main class="container container-admin">
    <div class="card" id="acessoAdmin" style="display:none;">
      <h3>🔐 Admin</h3>
      <input id="senhaAdmin" type="password" placeholder="Senha">
      <button onclick="loginAdmin()">Entrar</button>
      <button id="btnSairAdmin" class="btn-danger" onclick="logoutAdmin()" style="display:none;">Sair</button>
      <p id="adminStatus"></p>
    </div>

    <div class="card" id="painelAdmin" style="display:none;">
      <h3>Cadastrar Resultado</h3>

      <input id="dataResultado" type="date">

      <div class="linha-praca-fixa">
        <span class="rotulo-praca-fixa">Praça</span>
        <strong>Rio</strong>
      </div>
      <select id="praca" class="select-praca-oculta" aria-hidden="true" tabindex="-1"></select>

      <select id="loteria">
        <option value="">Selecione a loteria</option>
      </select>

      <div class="linha-numero-bicho">
        <input id="n1" placeholder="1º número (4 dígitos)" inputmode="numeric">
        <input id="g1" placeholder="Grupo/Bicho automático" readonly>
      </div>

      <div class="linha-numero-bicho">
        <input id="n2" placeholder="2º número (4 dígitos)" inputmode="numeric">
        <input id="g2" placeholder="Grupo/Bicho automático" readonly>
      </div>

      <div class="linha-numero-bicho">
        <input id="n3" placeholder="3º número (4 dígitos)" inputmode="numeric">
        <input id="g3" placeholder="Grupo/Bicho automático" readonly>
      </div>

      <div class="linha-numero-bicho">
        <input id="n4" placeholder="4º número (4 dígitos)" inputmode="numeric">
        <input id="g4" placeholder="Grupo/Bicho automático" readonly>
      </div>

      <div class="linha-numero-bicho">
        <input id="n5" placeholder="5º número (4 dígitos)" inputmode="numeric">
        <input id="g5" placeholder="Grupo/Bicho automático" readonly>
      </div>

      <button onclick="salvar()">Salvar</button>

      <h3>Multiplicadores de Aposta</h3>

      <div class="linha-multiplicador">
        <label for="multGrupo">Grupo 1º</label>
        <input id="multGrupo" type="text" inputmode="decimal" placeholder="Ex: 18">
      </div>
      <div class="linha-multiplicador">
        <label for="multDuplaGrupo">Dupla de Grupo</label>
        <input id="multDuplaGrupo" type="text" inputmode="decimal" placeholder="Ex: 90">
      </div>
      <div class="linha-multiplicador">
        <label for="multTernoGrupo">Terno de Grupo</label>
        <input id="multTernoGrupo" type="text" inputmode="decimal" placeholder="Ex: 320">
      </div>
      <div class="linha-multiplicador">
        <label for="multDuplaGrupo1a5">Dupla de Grupo 1º ao 5º</label>
        <input id="multDuplaGrupo1a5" type="text" inputmode="decimal" placeholder="Ex: 45">
      </div>
      <div class="linha-multiplicador">
        <label for="multTernoGrupo1a5">Terno de Grupo 1º ao 5º</label>
        <input id="multTernoGrupo1a5" type="text" inputmode="decimal" placeholder="Ex: 140">
      </div>
      <div class="linha-multiplicador">
        <label for="multPasseSeco">Passe-Seco</label>
        <input id="multPasseSeco" type="text" inputmode="decimal" placeholder="Ex: 120">
      </div>
      <div class="linha-multiplicador">
        <label for="multPasseVaiVem">Passe Vai e Vem</label>
        <input id="multPasseVaiVem" type="text" inputmode="decimal" placeholder="Ex: 70">
      </div>
      <div class="linha-multiplicador">
        <label for="multDuqueDezena">Duque de Dezena</label>
        <input id="multDuqueDezena" type="text" inputmode="decimal" placeholder="Ex: 180">
      </div>
      <div class="linha-multiplicador">
        <label for="multTernoDezena">Terno de Dezena</label>
        <input id="multTernoDezena" type="text" inputmode="decimal" placeholder="Ex: 700">
      </div>
      <div class="linha-multiplicador">
        <label for="multMilhar">Milhar</label>
        <input id="multMilhar" type="text" inputmode="decimal" placeholder="Ex: 4000">
      </div>
      <div class="linha-multiplicador">
        <label for="multCentena">Centena</label>
        <input id="multCentena" type="text" inputmode="decimal" placeholder="Ex: 600">
      </div>
      <div class="linha-multiplicador">
        <label for="multDezena">Dezena</label>
        <input id="multDezena" type="text" inputmode="decimal" placeholder="Ex: 60">
      </div>

      <button onclick="salvarMultiplicadores()">Salvar Multiplicadores</button>
      <button class="btn-secondary" onclick="restaurarMultiplicadoresPadrao()">Restaurar Padrão</button>
      <p id="multiplicadoresStatus"></p>

      <h3>Limites de Aposta</h3>

      <input id="limiteMinimoAposta" type="number" min="0.01" step="0.01" placeholder="Valor mínimo (R$)">
      <input id="limiteMaximoAposta" type="number" min="0.01" step="0.01" placeholder="Valor máximo (R$)">

      <button onclick="salvarLimitesAposta()">Salvar Limites</button>
      <button class="btn-secondary" onclick="restaurarLimitesPadrao()">Restaurar Limites Padrão</button>
      <p id="limitesApostaStatus"></p>

      <h3>Painel de Cadastros e Apostas</h3>
      <p id="resumoPainelAdmin" class="resumo-painel-admin">Carregando...</p>

      <div class="painel-admin-listas">
        <div class="painel-admin-bloco">
          <h4>Usuários Cadastrados</h4>
          <div id="listaUsuariosAdmin" class="lista-admin-scroll"></div>
        </div>

        <div class="painel-admin-bloco">
          <h4>Apostas da Data Selecionada</h4>
          <div id="listaApostasAdmin" class="lista-admin-scroll"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="rodape-pagina">
    Porco do Bicho • Painel Admin • Atualizado em 25/04/2026.
  </footer>

  <script src="../js/app.js?v=20260427-8"></script>
</body>
</html>
