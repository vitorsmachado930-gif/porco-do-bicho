name: Deploy Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state-hostinger-v5.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            storage/resultados_sync.json
            storage/backups/**

      # Some Hostinger accounts serve addon domains from /domains/<domain>/public_html
      # instead of /public_html. We deploy there too to keep both targets in sync.
      - name: Deploy to Hostinger addon-domain directory
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /domains/porcodobicho.com/public_html/
          state-name: .ftp-deploy-sync-state-hostinger-v5-addon.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            storage/resultados_sync.json
            storage/backups/**
